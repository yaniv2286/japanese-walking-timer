name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Create Capacitor config
      run: |
        echo '{"appId": "com.yaniv.japanesewalkingtimer", "appName": "Japanese Walking Timer", "webDir": ".", "bundledWebRuntime": false}' > capacitor.config.json
    
    - name: Add Android platform
      run: |
        npx @capacitor/cli@latest add android
        npx @capacitor/cli@latest sync android
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Build APK
      run: |
        cd android
        ./gradlew assembleDebug --info
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
